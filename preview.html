<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>小杳知</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC",sans-serif;
  background:#f2f2f7; min-height:100vh;
  display:flex; justify-content:center; padding-top:54px;
}
.phone { width:min(100vw,430px); background:#f2f2f7; }
.nav {
  height:52px; display:flex; align-items:center; justify-content:center;
  position:relative; padding:0 16px;
}
.nav-back {
  position:absolute; left:21px; width:32px; height:32px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; border-radius:8px;
}
.nav-back::before {
  content:""; display:block; width:14px; height:14px;
  border-left:2.5px solid #007aff; border-bottom:2.5px solid #007aff;
  border-radius:2px; transform:rotate(45deg);
}
.nav-title { font-size:18px; font-weight:600; color:#1c1c1e; }

.hero {
  display:flex; flex-direction:column; align-items:center;
  padding:28px 24px 18px; text-align:center;
}
.avatar-shell {
  width:80px; height:80px; border-radius:28px; padding:4px;
  background:rgba(255,255,255,0.55);
}
.avatar {
  width:100%; height:100%; border-radius:24px; overflow:hidden;
  background:linear-gradient(145deg,#dbeeff,#84bce6 46%,#5b91c3);
  display:flex; align-items:center; justify-content:center;
  color:#fff; font-weight:800; font-size:36px;
}
.plugin-name { margin-top:14px; font-size:28px; font-weight:800; color:#1c1c1e; }
.plugin-version { margin-top:3px; font-size:15px; color:#8e8e93; }

.section-label {
  padding:20px 20px 10px; color:#8e8e93; font-size:14px;
  text-transform:uppercase; letter-spacing:0.5px;
}
.card {
  margin:0 18px 16px; border-radius:18px;
  background:rgba(255,255,255,0.72); overflow:hidden;
}
.row {
  display:flex; align-items:center; height:48px; padding:0 18px; position:relative;
}
.row+.row::before {
  content:''; position:absolute; top:0; left:18px; right:0;
  height:0.5px; background:rgba(60,60,67,0.10);
}
.row-label { flex:1; font-size:17px; color:#1c1c1e; }
.row-detail { font-size:15px; color:#8e8e93; margin-right:4px; text-align:right; }
.row-detail .badge-red  { color:#ff3b30; font-weight:500; }
.row-detail .badge-orange { color:#ff9500; font-weight:500; }
.row-detail .badge-green { color:#34c759; font-weight:500; }
.dot-green { width:10px; height:10px; border-radius:5px; background:#34c759; margin-right:6px; }
.dot-gray  { width:10px; height:10px; border-radius:5px; background:#d1d1d6; margin-right:6px; }
.bottom-follow {
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:min(100vw,430px); padding:0 18px 24px;
  background:linear-gradient(180deg,rgba(242,242,247,0) 0%,rgba(242,242,247,0.92) 30%,rgba(242,242,247,1) 50%);
}
.follow-card {
  height:48px; border-radius:18px;
  background:rgba(255,255,255,0.78);
  display:flex; align-items:center; padding:0 18px;
}
.follow-avatar {
  width:26px; height:26px; border-radius:8px; background:#007aff; margin-right:10px;
  display:flex; align-items:center; justify-content:center;
  color:#fff; font-size:14px; font-weight:600;
}
.follow-label { flex:1; font-size:17px; color:#1c1c1e; }
.follow-status { font-size:14px; color:#007aff; font-weight:500; margin-right:4px; }
.follow-dot { width:6px; height:6px; border-radius:3px; background:#007aff; }
</style>
</head>
<body>
<div class="phone">

<!-- ====== 到期信息页 (currentPage==1) ====== -->

  <div class="section-label">用户信息</div>
  <div class="card">
    <div class="row"><span class="row-label">微信名</span><span class="row-detail">杳知</span></div>
    <div class="row"><span class="row-label">微信号</span><span class="row-detail">yao_zhil</span></div>
  </div>

  <div class="section-label">应用信息</div>
  <div class="card">
    <div class="row"><span class="row-label">应用名称</span><span class="row-detail">微信</span></div>
    <div class="row"><span class="row-label">系统版本</span><span class="row-detail">iOS 26.0</span></div>
    <div class="row"><span class="row-label">微信包名</span><span class="row-detail">com.tencent.xin</span></div>
    <div class="row"><span class="row-label">微信版本</span><span class="row-detail">8.0.58</span></div>
    <div class="row"><span class="row-label">设备标识</span><span class="row-detail">iPhone 18,1</span></div>
  </div>

  <div class="section-label">证书信息</div>
  <div class="card">
    <div class="row"><span class="row-label">证书到期</span><span class="row-detail">2027-12-31  ·  <span class="badge-green">剩余 365天</span></span></div>
  </div>

  <div class="section-label">权限信息</div>
  <div class="card">
    <div class="row"><span class="row-label">应用组</span><span class="dot-green"></span></div>
    <div class="row"><span class="row-label">WiFi 访问</span><span class="dot-green"></span></div>
    <div class="row"><span class="row-label">扩展虚拟地址</span><span class="dot-green"></span></div>
    <div class="row"><span class="row-label">推送通知</span><span class="dot-green"></span></div>
    <div class="row"><span class="row-label">钥匙串访问</span><span class="dot-green"></span></div>
    <div class="row"><span class="row-label">增加内存限制</span><span class="dot-green"></span></div>
    <div class="row"><span class="row-label">查看全部权限</span><span class="row-detail">›</span></div>
  </div>

  <!-- ====== 全部权限子页 (currentPage==2) ====== -->

  <div style="height:24px"></div>

  <div class="section-label">已开启</div>
  <div class="card">
    <div class="row"><span class="row-label">应用组</span><span class="dot-green"></span></div>
    <div class="row"><span class="row-label">WiFi 访问</span><span class="dot-green"></span></div>
    <div class="row"><span class="row-label">扩展虚拟地址</span><span class="dot-green"></span></div>
    <div class="row"><span class="row-label">推送通知</span><span class="dot-green"></span></div>
    <div class="row"><span class="row-label">钥匙串访问</span><span class="dot-green"></span></div>
    <div class="row"><span class="row-label">增加内存限制</span><span class="dot-green"></span></div>
    <div class="row"><span class="row-label">关联域</span><span class="dot-green"></span></div>
    <div class="row"><span class="row-label">Siri</span><span class="dot-green"></span></div>
    <div class="row"><span class="row-label">NFC</span><span class="dot-green"></span></div>
  </div>

  <div class="section-label">未开启</div>
  <div class="card">
    <div class="row"><span class="row-label">热点</span><span class="dot-gray"></span></div>
    <div class="row"><span class="row-label">健康数据</span><span class="dot-gray"></span></div>
    <div class="row"><span class="row-label">VPN</span><span class="dot-gray"></span></div>
    <div class="row"><span class="row-label">游戏中心</span><span class="dot-gray"></span></div>
  </div>

  <div style="height:100px"></div>

</div>
</body>
</html>
